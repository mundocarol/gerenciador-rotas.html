<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Medidor Profissional - Outdoor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #000;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        /* Container principal */
        .container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* Tela de câmera para capturar */
        .camera-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 50;
        }

        #video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Tela de medição (após capturar) */
        .medicao-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 20;
            display: none;
        }

        #fotoCapturada {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        #canvasMedicao {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 15;
            touch-action: none;
        }

        /* Botões da câmera */
        .capture-camera-btn {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 60;
            cursor: pointer;
            border: 4px solid #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            font-size: 40px;
            transition: 0.2s;
        }

        .capture-camera-btn:active {
            transform: translateX(-50%) scale(0.95);
        }

        .cancel-camera-btn {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 60;
            cursor: pointer;
        }

        /* Botão olho */
        .eye-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 30;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.3);
            font-size: 28px;
            transition: 0.2s;
        }

        .eye-btn:active {
            transform: scale(0.95);
        }

        /* Botão capturar na tela de medição */
        .save-medicao-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 65px;
            height: 65px;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 30;
            cursor: pointer;
            border: 3px solid #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            font-size: 32px;
            transition: 0.2s;
        }

        .save-medicao-btn:active {
            transform: scale(0.95);
        }

        /* Painel de controle */
        .painel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 16px;
            z-index: 25;
            transition: opacity 0.3s, visibility 0.3s;
            border: 1px solid rgba(255,255,255,0.15);
        }

        .painel.oculto {
            opacity: 0;
            visibility: hidden;
        }

        .resultados {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 16px;
            padding: 12px;
            text-align: center;
            margin-bottom: 12px;
        }

        .area-grande {
            font-size: 36px;
            font-weight: bold;
            color: #ffaa44;
        }

        .medidas-row {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }

        .medida-card {
            flex: 1;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 6px;
        }

        .medida-label {
            font-size: 11px;
            color: #aaa;
        }

        .medida-valor {
            font-size: 18px;
            font-weight: bold;
            color: #ffaa44;
        }

        .modos {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        .modo-btn {
            flex: 1;
            background: #333;
            border: none;
            color: white;
            padding: 12px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }

        .modo-btn.ativo {
            background: #2196f3;
        }

        .orientacao {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        .orientacao-btn {
            flex: 1;
            background: #444;
            border: none;
            color: white;
            padding: 10px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
        }

        .orientacao-btn.ativo {
            background: #ff9800;
        }

        .ref-input {
            background: #222;
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 12px;
        }

        .ref-input label {
            font-size: 12px;
            color: #aaa;
        }

        .input-group {
            display: flex;
            gap: 8px;
            margin-top: 6px;
        }

        .input-group input {
            flex: 1;
            background: #333;
            border: 1px solid #555;
            color: white;
            padding: 10px;
            border-radius: 10px;
            font-size: 14px;
            text-align: center;
        }

        .input-group button {
            background: #4caf50;
            padding: 10px 16px;
            width: auto;
            margin: 0;
        }

        button {
            background: #2196f3;
            border: none;
            color: white;
            padding: 12px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
            margin-top: 6px;
        }

        button:active {
            transform: scale(0.97);
        }

        .btn-reset {
            background: #f44336;
        }

        /* Popup de confirmação */
        .popup-confirm {
            position: absolute;
            bottom: 100px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 20px;
            z-index: 40;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .popup-confirm.oculto {
            display: none;
        }

        .popup-confirm p {
            margin-bottom: 15px;
            font-size: 16px;
        }

        .popup-buttons {
            display: flex;
            gap: 10px;
        }

        .popup-buttons button {
            margin: 0;
            padding: 12px;
        }

        .btn-confirm {
            background: #4caf50;
        }

        .btn-cancel {
            background: #f44336;
        }

        @media (max-width: 600px) {
            .area-grande { font-size: 28px; }
            .modo-btn { padding: 10px; font-size: 12px; }
            .capture-camera-btn { width: 70px; height: 70px; font-size: 35px; bottom: 70px; }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Tela de captura de foto -->
    <div class="camera-screen" id="cameraScreen">
        <video id="video" autoplay playsinline muted></video>
        <div class="capture-camera-btn" id="capturePhotoBtn">📷</div>
        <button class="cancel-camera-btn" id="cancelCameraBtn">↺ Cancelar</button>
    </div>

    <!-- Tela de medição -->
    <div class="medicao-screen" id="medicaoScreen">
        <img id="fotoCapturada" alt="Foto capturada">
        <canvas id="canvasMedicao"></canvas>

        <div class="eye-btn" id="eyeBtn">👁️</div>
        <div class="save-medicao-btn" id="saveMedicaoBtn">📸</div>

        <div class="painel" id="painel">
            <div class="resultados">
                <div class="area-grande" id="areaDisplay">--- m²</div>
                <div class="medidas-row">
                    <div class="medida-card">
                        <div class="medida-label">📐 Altura</div>
                        <div class="medida-valor" id="alturaDisplay">--- m</div>
                    </div>
                    <div class="medida-card">
                        <div class="medida-label">📏 Largura</div>
                        <div class="medida-valor" id="larguraDisplay">--- m</div>
                    </div>
                </div>
            </div>

            <div class="modos">
                <button id="modoRefBtn" class="modo-btn ativo">📏 Ajustar Referência</button>
                <button id="modoRetBtn" class="modo-btn">📐 Medir Área</button>
            </div>

            <div id="refConfig">
                <div class="orientacao">
                    <button id="orientVerticalBtn" class="orientacao-btn ativo">📏 Vertical</button>
                    <button id="orientHorizontalBtn" class="orientacao-btn">📐 Horizontal</button>
                </div>
                <div class="ref-input">
                    <label>🔧 Tamanho real da referência (metros):</label>
                    <div class="input-group">
                        <input type="number" id="refTamanho" step="0.01" value="1.00">
                        <button id="aplicarRef">Aplicar</button>
                    </div>
                </div>
            </div>

            <div id="retConfig" style="display:none;">
            </div>

            <button id="resetBtn" class="btn-reset">🗑️ Nova Foto</button>
        </div>
    </div>

    <!-- Popup de confirmação -->
    <div id="popupConfirm" class="popup-confirm oculto">
        <p>📸 Salvar esta medição?</p>
        <div class="popup-buttons">
            <button id="confirmSaveBtn" class="btn-confirm">✅ Salvar</button>
            <button id="cancelSaveBtn" class="btn-cancel">❌ Cancelar</button>
        </div>
    </div>
</div>

<script>
    // Elementos
    const cameraScreen = document.getElementById('cameraScreen');
    const medicaoScreen = document.getElementById('medicaoScreen');
    const video = document.getElementById('video');
    const capturePhotoBtn = document.getElementById('capturePhotoBtn');
    const cancelCameraBtn = document.getElementById('cancelCameraBtn');
    const fotoCapturada = document.getElementById('fotoCapturada');
    const canvasMedicao = document.getElementById('canvasMedicao');
    const ctx = canvasMedicao.getContext('2d');
    
    // Estado
    let modoAtual = 'referencia';
    let painelVisivel = true;
    let orientacaoRef = 'vertical';
    let imagemCapturada = false;
    let fotoBase64 = null;
    
    // Dimensões da imagem capturada
    let imgWidth = 0;
    let imgHeight = 0;
    let imgRect = { x: 0, y: 0, w: 0, h: 0 };
    
    // Retângulo de medição (verde)
    let retangulo = {
        x: 0.3, y: 0.3,
        width: 0.4, height: 0.4
    };
    
    // Retângulo de referência (vermelho)
    let referenciaRet = {
        x: 0.4, y: 0.5,
        width: 0.2, height: 0.2
    };
    
    let referenciaTamanhoReal = 1.0;
    let pixelsPorMetro = null;
    let arrastando = false;
    let itemArrastando = null;
    let ultimoToque = null;
    
    // UI
    const areaDisplay = document.getElementById('areaDisplay');
    const alturaDisplay = document.getElementById('alturaDisplay');
    const larguraDisplay = document.getElementById('larguraDisplay');
    const eyeBtn = document.getElementById('eyeBtn');
    const saveMedicaoBtn = document.getElementById('saveMedicaoBtn');
    const painel = document.getElementById('painel');
    const modoRefBtn = document.getElementById('modoRefBtn');
    const modoRetBtn = document.getElementById('modoRetBtn');
    const refConfig = document.getElementById('refConfig');
    const retConfig = document.getElementById('retConfig');
    const orientVerticalBtn = document.getElementById('orientVerticalBtn');
    const orientHorizontalBtn = document.getElementById('orientHorizontalBtn');
    const refTamanho = document.getElementById('refTamanho');
    const aplicarRef = document.getElementById('aplicarRef');
    const resetBtn = document.getElementById('resetBtn');
    const popupConfirm = document.getElementById('popupConfirm');
    const confirmSaveBtn = document.getElementById('confirmSaveBtn');
    const cancelSaveBtn = document.getElementById('cancelSaveBtn');
    
    let canvasW, canvasH;
    let cameraAtiva = false;
    let streamAtual = null;
    
    // Iniciar câmera
    async function iniciarCamera() {
        try {
            if (streamAtual) {
                streamAtual.getTracks().forEach(track => track.stop());
            }
            const constraints = {
                video: {
                    facingMode: 'environment',
                    width: { ideal: 1920 },
                    height: { ideal: 1080 }
                }
            };
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            streamAtual = stream;
            video.srcObject = stream;
            await new Promise((resolve) => {
                video.onloadedmetadata = () => {
                    video.play();
                    resolve();
                };
            });
            cameraAtiva = true;
        } catch(err) {
            alert("Erro ao acessar câmera. Verifique as permissões.");
        }
    }
    
    // Capturar foto
    function capturarFoto() {
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const tempCtx = canvas.getContext('2d');
        tempCtx.drawImage(video, 0, 0, canvas.width, canvas.height);
        fotoBase64 = canvas.toDataURL('image/jpeg', 0.95);
        fotoCapturada.src = fotoBase64;
        
        // Aguardar imagem carregar para obter dimensões
        fotoCapturada.onload = () => {
            imgWidth = fotoCapturada.naturalWidth;
            imgHeight = fotoCapturada.naturalHeight;
            calcularImgRect();
            resetMedicoes();
            cameraScreen.style.display = 'none';
            medicaoScreen.style.display = 'block';
            imagemCapturada = true;
            desenhar();
        };
    }
    
    // Calcular onde a imagem aparece no canvas
    function calcularImgRect() {
        if (!imgWidth || !imgHeight) return;
        
        const canvasAspect = canvasW / canvasH;
        const imgAspect = imgWidth / imgHeight;
        
        if (imgAspect > canvasAspect) {
            imgRect.w = canvasW;
            imgRect.h = canvasW / imgAspect;
            imgRect.x = 0;
            imgRect.y = (canvasH - imgRect.h) / 2;
        } else {
            imgRect.h = canvasH;
            imgRect.w = canvasH * imgAspect;
            imgRect.x = (canvasW - imgRect.w) / 2;
            imgRect.y = 0;
        }
    }
    
    // Converter coordenada normalizada para pixel na imagem
    function normToPixel(p) {
        return {
            x: imgRect.x + p.x * imgRect.w,
            y: imgRect.y + p.y * imgRect.h
        };
    }
    
    // Converter pixel para normalizado
    function pixelToNorm(px, py) {
        return {
            x: (px - imgRect.x) / imgRect.w,
            y: (py - imgRect.y) / imgRect.h
        };
    }
    
    // Obter tamanho do retângulo de referência em pixels
    function getReferenciaPixels() {
        if (orientacaoRef === 'vertical') {
            return referenciaRet.height * imgRect.h;
        } else {
            return referenciaRet.width * imgRect.w;
        }
    }
    
    // Atualizar escala
    function atualizarEscala() {
        const tamanhoPx = getReferenciaPixels();
        if (tamanhoPx > 0 && referenciaTamanhoReal > 0) {
            pixelsPorMetro = tamanhoPx / referenciaTamanhoReal;
        }
    }
    
    // Obter dimensões em metros
    function getMetros() {
        if (!pixelsPorMetro) return { altura: null, largura: null, area: null };
        const altPx = retangulo.height * imgRect.h;
        const largPx = retangulo.width * imgRect.w;
        const altM = altPx / pixelsPorMetro;
        const largM = largPx / pixelsPorMetro;
        return { altura: altM, largura: largM, area: altM * largM };
    }
    
    // Aplicar restrições
    function aplicarRestricaoReferencia() {
        referenciaRet.x = Math.min(0.96, Math.max(0.02, referenciaRet.x));
        referenciaRet.y = Math.min(0.96, Math.max(0.02, referenciaRet.y));
        referenciaRet.width = Math.min(0.96 - referenciaRet.x, Math.max(0.05, referenciaRet.width));
        referenciaRet.height = Math.min(0.96 - referenciaRet.y, Math.max(0.05, referenciaRet.height));
    }
    
    function mudarOrientacao(orient) {
        orientacaoRef = orient;
        if (orient === 'vertical') {
            orientVerticalBtn.classList.add('ativo');
            orientHorizontalBtn.classList.remove('ativo');
        } else {
            orientVerticalBtn.classList.remove('ativo');
            orientHorizontalBtn.classList.add('ativo');
        }
        desenhar();
    }
    
    function desenhar() {
        if (!ctx || !imagemCapturada) return;
        ctx.clearRect(0, 0, canvasW, canvasH);
        
        if (imgRect.w === 0) calcularImgRect();
        
        // Desenhar RETÂNGULO DE REFERÊNCIA (vermelho)
        const refPx = {
            x: imgRect.x + referenciaRet.x * imgRect.w,
            y: imgRect.y + referenciaRet.y * imgRect.h,
            w: referenciaRet.width * imgRect.w,
            h: referenciaRet.height * imgRect.h
        };
        
        ctx.strokeStyle = '#ff3366';
        ctx.lineWidth = 4;
        ctx.setLineDash([]);
        ctx.strokeRect(refPx.x, refPx.y, refPx.w, refPx.h);
        
        ctx.fillStyle = 'rgba(255,51,102,0.15)';
        ctx.fillRect(refPx.x, refPx.y, refPx.w, refPx.h);
        
        // Indicador visual
        if (orientacaoRef === 'vertical') {
            ctx.strokeStyle = '#ff8888';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.moveTo(refPx.x + refPx.w/2, refPx.y);
            ctx.lineTo(refPx.x + refPx.w/2, refPx.y + refPx.h);
            ctx.stroke();
            
            ctx.font = "bold 10px sans-serif";
            ctx.fillStyle = '#ff8888';
            ctx.fillText("📏 Altura", refPx.x + refPx.w/2 + 5, refPx.y + refPx.h/2);
        } else {
            ctx.strokeStyle = '#ff8888';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.moveTo(refPx.x, refPx.y + refPx.h/2);
            ctx.lineTo(refPx.x + refPx.w, refPx.y + refPx.h/2);
            ctx.stroke();
            
            ctx.font = "bold 10px sans-serif";
            ctx.fillStyle = '#ff8888';
            ctx.fillText("📏 Largura", refPx.x + refPx.w/2 - 20, refPx.y + refPx.h/2 - 5);
        }
        ctx.setLineDash([]);
        
        // Alças do retângulo de referência
        if (modoAtual === 'referencia') {
            const tamanhoAlca = 18;
            const cantos = [
                { x: refPx.x, y: refPx.y },
                { x: refPx.x + refPx.w, y: refPx.y },
                { x: refPx.x, y: refPx.y + refPx.h },
                { x: refPx.x + refPx.w, y: refPx.y + refPx.h }
            ];
            
            cantos.forEach(canto => {
                ctx.fillStyle = '#ff6666';
                ctx.beginPath();
                ctx.arc(canto.x, canto.y, tamanhoAlca/2, 0, 2*Math.PI);
                ctx.fill();
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(canto.x, canto.y, tamanhoAlca/3, 0, 2*Math.PI);
                ctx.fill();
            });
            
            const centroX = refPx.x + refPx.w/2;
            const centroY = refPx.y + refPx.h/2;
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.beginPath();
            ctx.arc(centroX, centroY, 14, 0, 2*Math.PI);
            ctx.fill();
            ctx.fillStyle = '#ff6666';
            ctx.beginPath();
            ctx.arc(centroX, centroY, 7, 0, 2*Math.PI);
            ctx.fill();
        }
        
        // Texto do tamanho da referência
        const tamanhoPx = getReferenciaPixels();
        ctx.font = "bold 12px sans-serif";
        ctx.fillStyle = '#ff99aa';
        ctx.shadowBlur = 2;
        ctx.fillText(`${referenciaTamanhoReal.toFixed(2)}m`, refPx.x + refPx.w/2 - 20, refPx.y - 8);
        ctx.shadowBlur = 0;
        
        // Desenhar RETÂNGULO DE MEDIÇÃO (verde)
        const retPx = {
            x: imgRect.x + retangulo.x * imgRect.w,
            y: imgRect.y + retangulo.y * imgRect.h,
            w: retangulo.width * imgRect.w,
            h: retangulo.height * imgRect.h
        };
        
        const corRetangulo = modoAtual === 'retangulo' ? '#00ffcc' : '#88aaff';
        ctx.strokeStyle = corRetangulo;
        ctx.lineWidth = 4;
        ctx.strokeRect(retPx.x, retPx.y, retPx.w, retPx.h);
        
        ctx.fillStyle = modoAtual === 'retangulo' ? 'rgba(0,255,200,0.15)' : 'rgba(136,170,255,0.1)';
        ctx.fillRect(retPx.x, retPx.y, retPx.w, retPx.h);
        
        // Mostrar medidas fora do retângulo
        const dimensoes = getMetros();
        if (dimensoes.altura && dimensoes.largura) {
            ctx.font = "bold 14px sans-serif";
            ctx.shadowBlur = 0;
            
            // Largura em cima
            const larguraTexto = `${dimensoes.largura.toFixed(2)}m`;
            const centerX = retPx.x + retPx.w/2;
            const medidaLargura = ctx.measureText(larguraTexto);
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(centerX - medidaLargura.width/2 - 5, retPx.y - 22, medidaLargura.width + 10, 20);
            ctx.fillStyle = '#00ffcc';
            ctx.fillText(larguraTexto, centerX - medidaLargura.width/2, retPx.y - 8);
            
            // Altura do lado esquerdo
            const alturaTexto = `${dimensoes.altura.toFixed(2)}m`;
            const medidaAltura = ctx.measureText(alturaTexto);
            const centerY = retPx.y + retPx.h/2;
            
            ctx.save();
            ctx.translate(retPx.x - 15, centerY);
            ctx.rotate(-Math.PI/2);
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(-medidaAltura.width/2 - 5, -10, medidaAltura.width + 10, 20);
            ctx.fillStyle = '#00ffcc';
            ctx.fillText(alturaTexto, -medidaAltura.width/2, 4);
            ctx.restore();
        }
        
        // Alças do retângulo de medição
        if (modoAtual === 'retangulo') {
            const tamanhoAlca = 18;
            const cantos = [
                { x: retPx.x, y: retPx.y },
                { x: retPx.x + retPx.w, y: retPx.y },
                { x: retPx.x, y: retPx.y + retPx.h },
                { x: retPx.x + retPx.w, y: retPx.y + retPx.h }
            ];
            
            cantos.forEach(canto => {
                ctx.fillStyle = '#00ffcc';
                ctx.beginPath();
                ctx.arc(canto.x, canto.y, tamanhoAlca/2, 0, 2*Math.PI);
                ctx.fill();
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(canto.x, canto.y, tamanhoAlca/3, 0, 2*Math.PI);
                ctx.fill();
            });
            
            const centroX = retPx.x + retPx.w/2;
            const centroY = retPx.y + retPx.h/2;
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.beginPath();
            ctx.arc(centroX, centroY, 14, 0, 2*Math.PI);
            ctx.fill();
            ctx.fillStyle = '#00ffcc';
            ctx.beginPath();
            ctx.arc(centroX, centroY, 7, 0, 2*Math.PI);
            ctx.fill();
        }
        
        atualizarEscala();
        if (dimensoes.altura && dimensoes.largura) {
            alturaDisplay.innerHTML = dimensoes.altura.toFixed(3) + ' m';
            larguraDisplay.innerHTML = dimensoes.largura.toFixed(3) + ' m';
            areaDisplay.innerHTML = dimensoes.area.toFixed(3) + ' m²';
        } else {
            alturaDisplay.innerHTML = '--- m';
            larguraDisplay.innerHTML = '--- m';
            areaDisplay.innerHTML = '--- m²';
        }
    }
    
    function verificarToque(px, py) {
        const refPx = {
            x: imgRect.x + referenciaRet.x * imgRect.w,
            y: imgRect.y + referenciaRet.y * imgRect.h,
            w: referenciaRet.width * imgRect.w,
            h: referenciaRet.height * imgRect.h
        };
        
        const tamanhoAlca = 35;
        
        if (modoAtual === 'referencia') {
            if (Math.hypot(px - refPx.x, py - refPx.y) < tamanhoAlca) return 'refTL';
            if (Math.hypot(px - (refPx.x + refPx.w), py - refPx.y) < tamanhoAlca) return 'refTR';
            if (Math.hypot(px - refPx.x, py - (refPx.y + refPx.h)) < tamanhoAlca) return 'refBL';
            if (Math.hypot(px - (refPx.x + refPx.w), py - (refPx.y + refPx.h)) < tamanhoAlca) return 'refBR';
            
            const refCentroX = refPx.x + refPx.w/2;
            const refCentroY = refPx.y + refPx.h/2;
            if (Math.hypot(px - refCentroX, py - refCentroY) < 40) return 'refMover';
        }
        
        const retPx = {
            x: imgRect.x + retangulo.x * imgRect.w,
            y: imgRect.y + retangulo.y * imgRect.h,
            w: retangulo.width * imgRect.w,
            h: retangulo.height * imgRect.h
        };
        
        if (Math.hypot(px - retPx.x, py - retPx.y) < tamanhoAlca) return 'cantoTL';
        if (Math.hypot(px - (retPx.x + retPx.w), py - retPx.y) < tamanhoAlca) return 'cantoTR';
        if (Math.hypot(px - retPx.x, py - (retPx.y + retPx.h)) < tamanhoAlca) return 'cantoBL';
        if (Math.hypot(px - (retPx.x + retPx.w), py - (retPx.y + retPx.h)) < tamanhoAlca) return 'cantoBR';
        
        const centroX = retPx.x + retPx.w/2;
        const centroY = retPx.y + retPx.h/2;
        if (Math.hypot(px - centroX, py - centroY) < 40) return 'mover';
        
        return null;
    }
    
    function handleTouchStart(e) {
        if (!imagemCapturada) return;
        e.preventDefault();
        
        const rect = canvasMedicao.getBoundingClientRect();
        const scaleX = canvasMedicao.width / rect.width;
        const scaleY = canvasMedicao.height / rect.height;
        const touch = e.touches[0];
        let canvasX = (touch.clientX - rect.left) * scaleX;
        let canvasY = (touch.clientY - rect.top) * scaleY;
        canvasX = Math.min(Math.max(0, canvasX), canvasW);
        canvasY = Math.min(Math.max(0, canvasY), canvasH);
        
        const item = verificarToque(canvasX, canvasY);
        if (item) {
            arrastando = true;
            itemArrastando = item;
            ultimoToque = { x: canvasX, y: canvasY };
        }
    }
    
    function handleTouchMove(e) {
        if (!arrastando || !ultimoToque) return;
        e.preventDefault();
        
        const rect = canvasMedicao.getBoundingClientRect();
        const scaleX = canvasMedicao.width / rect.width;
        const scaleY = canvasMedicao.height / rect.height;
        const touch = e.touches[0];
        let canvasX = (touch.clientX - rect.left) * scaleX;
        let canvasY = (touch.clientY - rect.top) * scaleY;
        canvasX = Math.min(Math.max(0, canvasX), canvasW);
        canvasY = Math.min(Math.max(0, canvasY), canvasH);
        
        const deltaX = (canvasX - ultimoToque.x) / imgRect.w;
        const deltaY = (canvasY - ultimoToque.y) / imgRect.h;
        
        if (itemArrastando === 'cantoTL') {
            retangulo.width -= deltaX;
            retangulo.height -= deltaY;
            retangulo.x += deltaX;
            retangulo.y += deltaY;
        } else if (itemArrastando === 'cantoTR') {
            retangulo.width += deltaX;
            retangulo.height -= deltaY;
            retangulo.y += deltaY;
        } else if (itemArrastando === 'cantoBL') {
            retangulo.width -= deltaX;
            retangulo.height += deltaY;
            retangulo.x += deltaX;
        } else if (itemArrastando === 'cantoBR') {
            retangulo.width += deltaX;
            retangulo.height += deltaY;
        } else if (itemArrastando === 'mover') {
            retangulo.x += deltaX;
            retangulo.y += deltaY;
        } else if (itemArrastando === 'refTL') {
            referenciaRet.width -= deltaX;
            referenciaRet.height -= deltaY;
            referenciaRet.x += deltaX;
            referenciaRet.y += deltaY;
            aplicarRestricaoReferencia();
        } else if (itemArrastando === 'refTR') {
            referenciaRet.width += deltaX;
            referenciaRet.height -= deltaY;
            referenciaRet.y += deltaY;
            aplicarRestricaoReferencia();
        } else if (itemArrastando === 'refBL') {
            referenciaRet.width -= deltaX;
            referenciaRet.height += deltaY;
            referenciaRet.x += deltaX;
            aplicarRestricaoReferencia();
        } else if (itemArrastando === 'refBR') {
            referenciaRet.width += deltaX;
            referenciaRet.height += deltaY;
            aplicarRestricaoReferencia();
        } else if (itemArrastando === 'refMover') {
            referenciaRet.x += deltaX;
            referenciaRet.y += deltaY;
            aplicarRestricaoReferencia();
        }
        
        retangulo.x = Math.min(0.98, Math.max(0, retangulo.x));
        retangulo.y = Math.min(0.98, Math.max(0, retangulo.y));
        retangulo.width = Math.min(1 - retangulo.x, Math.max(0.02, retangulo.width));
        retangulo.height = Math.min(1 - retangulo.y, Math.max(0.02, retangulo.height));
        
        ultimoToque = { x: canvasX, y: canvasY };
        desenhar();
    }
    
    function handleTouchEnd() {
        arrastando = false;
        itemArrastando = null;
        desenhar();
    }
    
    function mudarModo(modo) {
        modoAtual = modo;
        if (modo === 'referencia') {
            modoRefBtn.classList.add('ativo');
            modoRetBtn.classList.remove('ativo');
            refConfig.style.display = 'block';
            retConfig.style.display = 'none';
        } else {
            modoRefBtn.classList.remove('ativo');
            modoRetBtn.classList.add('ativo');
            refConfig.style.display = 'none';
            retConfig.style.display = 'block';
        }
        desenhar();
    }
    
    function aplicarReferencia() {
        referenciaTamanhoReal = parseFloat(refTamanho.value);
        if (isNaN(referenciaTamanhoReal) || referenciaTamanhoReal <= 0) {
            referenciaTamanhoReal = 1.0;
            refTamanho.value = '1.00';
        }
        atualizarEscala();
        desenhar();
    }
    
    function resetMedicoes() {
        retangulo = { x: 0.3, y: 0.3, width: 0.4, height: 0.4 };
        referenciaRet = {
            x: 0.4, y: 0.5,
            width: 0.2, height: 0.2
        };
        pixelsPorMetro = null;
        aplicarRestricaoReferencia();
        if (imagemCapturada) desenhar();
    }
    
    function voltarCamera() {
        cameraScreen.style.display = 'block';
        medicaoScreen.style.display = 'none';
        imagemCapturada = false;
        iniciarCamera();
    }
    
    function mostrarPopup() {
        const dim = getMetros();
        if (!dim.altura || !dim.largura) {
            alert("⚠️ Ajuste a referência e o retângulo primeiro!");
            return false;
        }
        popupConfirm.classList.remove('oculto');
        return true;
    }
    
    async function executarCaptura() {
        const dim = getMetros();
        
        const printCanvas = document.createElement('canvas');
        const printCtx = printCanvas.getContext('2d');
        
        printCanvas.width = canvasW;
        printCanvas.height = canvasH;
        
        // Desenhar a foto
        const img = new Image();
        img.src = fotoBase64;
        await new Promise((resolve) => { img.onload = resolve; });
        
        printCtx.drawImage(img, 0, 0, img.width, img.height, imgRect.x, imgRect.y, imgRect.w, imgRect.h);
        
        // Desenhar retângulo de medição (verde)
        const retPx = {
            x: imgRect.x + retangulo.x * imgRect.w,
            y: imgRect.y + retangulo.y * imgRect.h,
            w: retangulo.width * imgRect.w,
            h: retangulo.height * imgRect.h
        };
        printCtx.strokeStyle = '#00ffcc';
        printCtx.lineWidth = 4;
        printCtx.strokeRect(retPx.x, retPx.y, retPx.w, retPx.h);
        
        // Medidas
        printCtx.font = "bold 16px sans-serif";
        printCtx.shadowBlur = 3;
        printCtx.shadowColor = 'black';
        
        const larguraTexto = `${dim.largura.toFixed(2)}m`;
        const centerX = retPx.x + retPx.w/2;
        const medidaLargura = printCtx.measureText(larguraTexto);
        printCtx.fillStyle = 'rgba(0,0,0,0.7)';
        printCtx.fillRect(centerX - medidaLargura.width/2 - 5, retPx.y - 28, medidaLargura.width + 10, 24);
        printCtx.fillStyle = '#00ffcc';
        printCtx.fillText(larguraTexto, centerX - medidaLargura.width/2, retPx.y - 10);
        
        const alturaTexto = `${dim.altura.toFixed(2)}m`;
        const medidaAltura = printCtx.measureText(alturaTexto);
        const centerY = retPx.y + retPx.h/2;
        
        printCtx.save();
        printCtx.translate(retPx.x - 20, centerY);
        printCtx.rotate(-Math.PI/2);
        printCtx.fillStyle = 'rgba(0,0,0,0.7)';
        printCtx.fillRect(-medidaAltura.width/2 - 5, -12, medidaAltura.width + 10, 24);
        printCtx.fillStyle = '#00ffcc';
        printCtx.fillText(alturaTexto, -medidaAltura.width/2, 5);
        printCtx.restore();
        
        // Rodapé
        const dataHora = new Date().toLocaleString();
        const textoInfo = `📐 ${dim.altura.toFixed(3)}m  |  📏 ${dim.largura.toFixed(3)}m  |  📊 ${dim.area.toFixed(3)}m²  |  ${dataHora}`;
        
        printCtx.fillStyle = 'rgba(0,0,0,0.8)';
        printCtx.fillRect(0, printCanvas.height - 45, printCanvas.width, 50);
        
        printCtx.font = "13px sans-serif";
        printCtx.fillStyle = '#ffffff';
        printCtx.shadowBlur = 0;
        printCtx.fillText(textoInfo, 15, printCanvas.height - 18);
        
        // Salvar
        printCanvas.toBlob((blob) => {
            const link = document.createElement('a');
            link.download = `medicao_${Date.now()}.png`;
            link.href = URL.createObjectURL(blob);
            link.click();
            URL.revokeObjectURL(link.href);
            alert("📸 Imagem salva!");
        });
    }
    
    function fecharPopup() {
        popupConfirm.classList.add('oculto');
    }
    
    function togglePainel() {
        painelVisivel = !painelVisivel;
        if (painelVisivel) {
            painel.classList.remove('oculto');
            eyeBtn.innerHTML = '👁️';
        } else {
            painel.classList.add('oculto');
            eyeBtn.innerHTML = '🚫';
        }
    }
    
    function redimensionar() {
        canvasW = window.innerWidth;
        canvasH = window.innerHeight;
        canvasMedicao.width = canvasW;
        canvasMedicao.height = canvasH;
        if (imgWidth && imgHeight) calcularImgRect();
        if (imagemCapturada) desenhar();
    }
    
    // Event listeners
    capturePhotoBtn.addEventListener('click', capturarFoto);
    cancelCameraBtn.addEventListener('click', voltarCamera);
    eyeBtn.addEventListener('click', togglePainel);
    saveMedicaoBtn.addEventListener('click', mostrarPopup);
    confirmSaveBtn.addEventListener('click', () => {
        fecharPopup();
        executarCaptura();
    });
    cancelSaveBtn.addEventListener('click', fecharPopup);
    modoRefBtn.addEventListener('click', () => mudarModo('referencia'));
    modoRetBtn.addEventListener('click', () => mudarModo('retangulo'));
    orientVerticalBtn.addEventListener('click', () => mudarOrientacao('vertical'));
    orientHorizontalBtn.addEventListener('click', () => mudarOrientacao('horizontal'));
    aplicarRef.addEventListener('click', aplicarReferencia);
    resetBtn.addEventListener('click', voltarCamera);
    window.addEventListener('resize', redimensionar);
    
    canvasMedicao.addEventListener('touchstart', handleTouchStart, { passive: false });
    canvasMedicao.addEventListener('touchmove', handleTouchMove, { passive: false });
    canvasMedicao.addEventListener('touchend', handleTouchEnd);
    
    // Iniciar
    redimensionar();
    iniciarCamera();
</script>
