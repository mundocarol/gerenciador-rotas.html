<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Medidor Profissional - Outdoor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #000;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        #video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            touch-action: none;
        }

        .eye-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 30;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.3);
            font-size: 28px;
            transition: 0.2s;
        }

        .eye-btn:active {
            transform: scale(0.95);
        }

        .capture-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 65px;
            height: 65px;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 30;
            cursor: pointer;
            border: 3px solid #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            font-size: 32px;
            transition: 0.2s;
        }

        .capture-btn:active {
            transform: scale(0.95);
        }

        .painel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 16px;
            z-index: 25;
            transition: opacity 0.3s, visibility 0.3s;
            border: 1px solid rgba(255,255,255,0.15);
        }

        .painel.oculto {
            opacity: 0;
            visibility: hidden;
        }

        .resultados {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 16px;
            padding: 12px;
            text-align: center;
            margin-bottom: 12px;
        }

        .area-grande {
            font-size: 36px;
            font-weight: bold;
            color: #ffaa44;
        }

        .medidas-row {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }

        .medida-card {
            flex: 1;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 6px;
        }

        .medida-label {
            font-size: 11px;
            color: #aaa;
        }

        .medida-valor {
            font-size: 18px;
            font-weight: bold;
            color: #ffaa44;
        }

        .modos {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        .modo-btn {
            flex: 1;
            background: #333;
            border: none;
            color: white;
            padding: 12px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }

        .modo-btn.ativo {
            background: #2196f3;
        }

        .orientacao {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        .orientacao-btn {
            flex: 1;
            background: #444;
            border: none;
            color: white;
            padding: 10px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
        }

        .orientacao-btn.ativo {
            background: #ff9800;
        }

        .ref-input {
            background: #222;
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 12px;
        }

        .ref-input label {
            font-size: 12px;
            color: #aaa;
        }

        .input-group {
            display: flex;
            gap: 8px;
            margin-top: 6px;
        }

        .input-group input {
            flex: 1;
            background: #333;
            border: 1px solid #555;
            color: white;
            padding: 10px;
            border-radius: 10px;
            font-size: 14px;
            text-align: center;
        }

        .input-group button {
            background: #4caf50;
            padding: 10px 16px;
            width: auto;
            margin: 0;
        }

        button {
            background: #2196f3;
            border: none;
            color: white;
            padding: 12px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
            margin-top: 6px;
        }

        button:active {
            transform: scale(0.97);
        }

        .btn-reset {
            background: #f44336;
        }

        @media (max-width: 600px) {
            .area-grande { font-size: 28px; }
            .modo-btn { padding: 10px; font-size: 12px; }
            .capture-btn { width: 55px; height: 55px; font-size: 28px; bottom: 15px; right: 15px; }
        }
    </style>
</head>
<body>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <div class="eye-btn" id="eyeBtn">👁️</div>
    <div class="capture-btn" id="captureBtn">📸</div>

    <div class="painel" id="painel">
        <div class="resultados">
            <div class="area-grande" id="areaDisplay">--- m²</div>
            <div class="medidas-row">
                <div class="medida-card">
                    <div class="medida-label">📐 Altura</div>
                    <div class="medida-valor" id="alturaDisplay">--- m</div>
                </div>
                <div class="medida-card">
                    <div class="medida-label">📏 Largura</div>
                    <div class="medida-valor" id="larguraDisplay">--- m</div>
                </div>
            </div>
        </div>

        <div class="modos">
            <button id="modoRefBtn" class="modo-btn ativo">📏 Ajustar Referência</button>
            <button id="modoRetBtn" class="modo-btn">📐 Medir Área</button>
        </div>

        <div id="refConfig">
            <div class="orientacao">
                <button id="orientVerticalBtn" class="orientacao-btn ativo">📏 Vertical</button>
                <button id="orientHorizontalBtn" class="orientacao-btn">📐 Horizontal</button>
            </div>
            <div class="ref-input">
                <label>🔧 Tamanho real da referência (metros):</label>
                <div class="input-group">
                    <input type="number" id="refTamanho" step="0.01" value="1.00">
                    <button id="aplicarRef">Aplicar</button>
                </div>
            </div>
        </div>

        <div id="retConfig" style="display:none;">
        </div>

        <button id="resetBtn" class="btn-reset">🗑️ Limpar Tudo</button>
    </div>

    <script>
        // Elementos
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Estado
        let modoAtual = 'referencia';
        let painelVisivel = true;
        let orientacaoRef = 'vertical';
        
        // Retângulo de medição (verde)
        let retangulo = {
            x: 0.3, y: 0.3,
            width: 0.4, height: 0.4
        };
        
        // Retângulo de referência (vermelho)
        let referenciaRet = {
            x: 0.4, y: 0.5,
            width: 0.2, height: 0.2
        };
        
        let referenciaTamanhoReal = 1.0;
        let pixelsPorMetro = null;
        let arrastando = false;
        let itemArrastando = null;
        let ultimoToque = null;
        
        // UI
        const areaDisplay = document.getElementById('areaDisplay');
        const alturaDisplay = document.getElementById('alturaDisplay');
        const larguraDisplay = document.getElementById('larguraDisplay');
        const eyeBtn = document.getElementById('eyeBtn');
        const captureBtn = document.getElementById('captureBtn');
        const painel = document.getElementById('painel');
        const modoRefBtn = document.getElementById('modoRefBtn');
        const modoRetBtn = document.getElementById('modoRetBtn');
        const refConfig = document.getElementById('refConfig');
        const retConfig = document.getElementById('retConfig');
        const orientVerticalBtn = document.getElementById('orientVerticalBtn');
        const orientHorizontalBtn = document.getElementById('orientHorizontalBtn');
        const refTamanho = document.getElementById('refTamanho');
        const aplicarRef = document.getElementById('aplicarRef');
        const resetBtn = document.getElementById('resetBtn');
        
        let canvasW, canvasH;
        let videoRect = { x: 0, y: 0, w: 0, h: 0 };
        let cameraAtiva = false;
        
        function calcularVideoRect() {
            if (!video.videoWidth || !video.videoHeight) return;
            const videoAspect = video.videoWidth / video.videoHeight;
            const canvasAspect = canvasW / canvasH;
            
            if (videoAspect > canvasAspect) {
                videoRect.w = canvasW;
                videoRect.h = canvasW / videoAspect;
                videoRect.x = 0;
                videoRect.y = (canvasH - videoRect.h) / 2;
            } else {
                videoRect.h = canvasH;
                videoRect.w = canvasH * videoAspect;
                videoRect.x = (canvasW - videoRect.w) / 2;
                videoRect.y = 0;
            }
        }
        
        function normToPixel(p) {
            return {
                x: videoRect.x + p.x * videoRect.w,
                y: videoRect.y + p.y * videoRect.h
            };
        }
        
        function pixelToNorm(px, py) {
            return {
                x: (px - videoRect.x) / videoRect.w,
                y: (py - videoRect.y) / videoRect.h
            };
        }
        
        // Obter tamanho do retângulo de referência em pixels (considerando orientação)
        function getReferenciaPixels() {
            if (orientacaoRef === 'vertical') {
                return referenciaRet.height * videoRect.h;
            } else {
                return referenciaRet.width * videoRect.w;
            }
        }
        
        // Atualizar escala baseado no retângulo de referência
        function atualizarEscala() {
            const tamanhoPx = getReferenciaPixels();
            if (tamanhoPx > 0 && referenciaTamanhoReal > 0) {
                pixelsPorMetro = tamanhoPx / referenciaTamanhoReal;
            }
        }
        
        // Obter dimensões em metros
        function getMetros() {
            if (!pixelsPorMetro) return { altura: null, largura: null, area: null };
            const altPx = retangulo.height * videoRect.h;
            const largPx = retangulo.width * videoRect.w;
            const altM = altPx / pixelsPorMetro;
            const largM = largPx / pixelsPorMetro;
            return { altura: altM, largura: largM, area: altM * largM };
        }
        
        // Aplicar restrições visuais para o retângulo de referência
        function aplicarRestricaoReferencia() {
            // Limitar dentro da tela
            referenciaRet.x = Math.min(0.96, Math.max(0.02, referenciaRet.x));
            referenciaRet.y = Math.min(0.96, Math.max(0.02, referenciaRet.y));
            referenciaRet.width = Math.min(0.96 - referenciaRet.x, Math.max(0.05, referenciaRet.width));
            referenciaRet.height = Math.min(0.96 - referenciaRet.y, Math.max(0.05, referenciaRet.height));
        }
        
        function mudarOrientacao(orient) {
            orientacaoRef = orient;
            if (orient === 'vertical') {
                orientVerticalBtn.classList.add('ativo');
                orientHorizontalBtn.classList.remove('ativo');
            } else {
                orientVerticalBtn.classList.remove('ativo');
                orientHorizontalBtn.classList.add('ativo');
            }
            desenhar();
        }
        
        function desenhar() {
            if (!ctx) return;
            ctx.clearRect(0, 0, canvasW, canvasH);
            
            if (videoRect.w === 0) calcularVideoRect();
            
            // Desenhar RETÂNGULO DE REFERÊNCIA (vermelho) - apenas se o painel estiver visível
            if (painelVisivel) {
                const refPx = {
                    x: videoRect.x + referenciaRet.x * videoRect.w,
                    y: videoRect.y + referenciaRet.y * videoRect.h,
                    w: referenciaRet.width * videoRect.w,
                    h: referenciaRet.height * videoRect.h
                };
                
                ctx.strokeStyle = '#ff3366';
                ctx.lineWidth = 4;
                ctx.setLineDash([]);
                ctx.strokeRect(refPx.x, refPx.y, refPx.w, refPx.h);
                
                ctx.fillStyle = 'rgba(255,51,102,0.15)';
                ctx.fillRect(refPx.x, refPx.y, refPx.w, refPx.h);
                
                // Indicador visual do que está sendo medido na referência
                if (orientacaoRef === 'vertical') {
                    // Destacar altura
                    ctx.strokeStyle = '#ff8888';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([5, 5]);
                    ctx.beginPath();
                    ctx.moveTo(refPx.x + refPx.w/2, refPx.y);
                    ctx.lineTo(refPx.x + refPx.w/2, refPx.y + refPx.h);
                    ctx.stroke();
                    ctx.fillStyle = '#ff8888';
                    ctx.font = "bold 10px sans-serif";
                    ctx.fillText("📏 Altura", refPx.x + refPx.w/2 + 5, refPx.y + refPx.h/2);
                } else {
                    // Destacar largura
                    ctx.strokeStyle = '#ff8888';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([5, 5]);
                    ctx.beginPath();
                    ctx.moveTo(refPx.x, refPx.y + refPx.h/2);
                    ctx.lineTo(refPx.x + refPx.w, refPx.y + refPx.h/2);
                    ctx.stroke();
                    ctx.fillStyle = '#ff8888';
                    ctx.font = "bold 10px sans-serif";
                    ctx.fillText("📏 Largura", refPx.x + refPx.w/2 - 20, refPx.y + refPx.h/2 - 5);
                }
                ctx.setLineDash([]);
                
                // Alças do retângulo de referência (apenas no modo referência)
                if (modoAtual === 'referencia') {
                    const tamanhoAlca = 18;
                    const cantos = [
                        { x: refPx.x, y: refPx.y },
                        { x: refPx.x + refPx.w, y: refPx.y },
                        { x: refPx.x, y: refPx.y + refPx.h },
                        { x: refPx.x + refPx.w, y: refPx.y + refPx.h }
                    ];
                    
                    cantos.forEach(canto => {
                        ctx.fillStyle = '#ff6666';
                        ctx.beginPath();
                        ctx.arc(canto.x, canto.y, tamanhoAlca/2, 0, 2*Math.PI);
                        ctx.fill();
                        ctx.fillStyle = 'white';
                        ctx.beginPath();
                        ctx.arc(canto.x, canto.y, tamanhoAlca/3, 0, 2*Math.PI);
                        ctx.fill();
                    });
                    
                    const centroX = refPx.x + refPx.w/2;
                    const centroY = refPx.y + refPx.h/2;
                    ctx.fillStyle = 'rgba(255,255,255,0.4)';
                    ctx.beginPath();
                    ctx.arc(centroX, centroY, 14, 0, 2*Math.PI);
                    ctx.fill();
                    ctx.fillStyle = '#ff6666';
                    ctx.beginPath();
                    ctx.arc(centroX, centroY, 7, 0, 2*Math.PI);
                    ctx.fill();
                }
                
                // Texto do tamanho da referência
                const tamanhoPx = getReferenciaPixels();
                ctx.font = "bold 12px sans-serif";
                ctx.fillStyle = '#ff99aa';
                ctx.shadowBlur = 2;
                ctx.fillText(`${referenciaTamanhoReal.toFixed(2)}m`, refPx.x + refPx.w/2 - 20, refPx.y - 8);
                ctx.shadowBlur = 0;
            }
            
            // Desenhar RETÂNGULO DE MEDIÇÃO (verde) - sempre visível
            const retPx = {
                x: videoRect.x + retangulo.x * videoRect.w,
                y: videoRect.y + retangulo.y * videoRect.h,
                w: retangulo.width * videoRect.w,
                h: retangulo.height * videoRect.h
            };
            
            const corRetangulo = modoAtual === 'retangulo' ? '#00ffcc' : '#88aaff';
            ctx.strokeStyle = corRetangulo;
            ctx.lineWidth = 4;
            ctx.strokeRect(retPx.x, retPx.y, retPx.w, retPx.h);
            
            ctx.fillStyle = modoAtual === 'retangulo' ? 'rgba(0,255,200,0.15)' : 'rgba(136,170,255,0.1)';
            ctx.fillRect(retPx.x, retPx.y, retPx.w, retPx.h);
            
            // Mostrar medidas dentro do retângulo
            const dimensoes = getMetros();
            if (dimensoes.altura && dimensoes.largura) {
                ctx.font = "bold 14px sans-serif";
                ctx.fillStyle = '#ffffff';
                ctx.shadowBlur = 3;
                ctx.fillText(`${dimensoes.largura.toFixed(2)}m`, retPx.x + retPx.w/2 - 25, retPx.y + retPx.h/2 - 10);
                ctx.fillText(`${dimensoes.altura.toFixed(2)}m`, retPx.x + retPx.w/2 - 20, retPx.y + retPx.h/2 + 15);
                ctx.shadowBlur = 0;
            }
            
            // Alças do retângulo de medição (apenas no modo retângulo)
            if (modoAtual === 'retangulo') {
                const tamanhoAlca = 18;
                const cantos = [
                    { x: retPx.x, y: retPx.y },
                    { x: retPx.x + retPx.w, y: retPx.y },
                    { x: retPx.x, y: retPx.y + retPx.h },
                    { x: retPx.x + retPx.w, y: retPx.y + retPx.h }
                ];
                
                cantos.forEach(canto => {
                    ctx.fillStyle = '#00ffcc';
                    ctx.beginPath();
                    ctx.arc(canto.x, canto.y, tamanhoAlca/2, 0, 2*Math.PI);
                    ctx.fill();
                    ctx.fillStyle = 'white';
                    ctx.beginPath();
                    ctx.arc(canto.x, canto.y, tamanhoAlca/3, 0, 2*Math.PI);
                    ctx.fill();
                });
                
                const centroX = retPx.x + retPx.w/2;
                const centroY = retPx.y + retPx.h/2;
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                ctx.beginPath();
                ctx.arc(centroX, centroY, 14, 0, 2*Math.PI);
                ctx.fill();
                ctx.fillStyle = '#00ffcc';
                ctx.beginPath();
                ctx.arc(centroX, centroY, 7, 0, 2*Math.PI);
                ctx.fill();
            }
            
            atualizarEscala();
            if (dimensoes.altura && dimensoes.largura) {
                alturaDisplay.innerHTML = dimensoes.altura.toFixed(3) + ' m';
                larguraDisplay.innerHTML = dimensoes.largura.toFixed(3) + ' m';
                areaDisplay.innerHTML = dimensoes.area.toFixed(3) + ' m²';
            } else {
                alturaDisplay.innerHTML = '--- m';
                larguraDisplay.innerHTML = '--- m';
                areaDisplay.innerHTML = '--- m²';
            }
        }
        
        function verificarToque(px, py) {
            // Verificar retângulo de referência (apenas se painel visível)
            if (painelVisivel) {
                const refPx = {
                    x: videoRect.x + referenciaRet.x * videoRect.w,
                    y: videoRect.y + referenciaRet.y * videoRect.h,
                    w: referenciaRet.width * videoRect.w,
                    h: referenciaRet.height * videoRect.h
                };
                
                const tamanhoAlca = 35;
                
                if (modoAtual === 'referencia') {
                    if (Math.hypot(px - refPx.x, py - refPx.y) < tamanhoAlca) return 'refTL';
                    if (Math.hypot(px - (refPx.x + refPx.w), py - refPx.y) < tamanhoAlca) return 'refTR';
                    if (Math.hypot(px - refPx.x, py - (refPx.y + refPx.h)) < tamanhoAlca) return 'refBL';
                    if (Math.hypot(px - (refPx.x + refPx.w), py - (refPx.y + refPx.h)) < tamanhoAlca) return 'refBR';
                    
                    const refCentroX = refPx.x + refPx.w/2;
                    const refCentroY = refPx.y + refPx.h/2;
                    if (Math.hypot(px - refCentroX, py - refCentroY) < 40) return 'refMover';
                }
            }
            
            // Verificar retângulo de medição
            const retPx = {
                x: videoRect.x + retangulo.x * videoRect.w,
                y: videoRect.y + retangulo.y * videoRect.h,
                w: retangulo.width * videoRect.w,
                h: retangulo.height * videoRect.h
            };
            
            const tamanhoAlca = 35;
            if (Math.hypot(px - retPx.x, py - retPx.y) < tamanhoAlca) return 'cantoTL';
            if (Math.hypot(px - (retPx.x + retPx.w), py - retPx.y) < tamanhoAlca) return 'cantoTR';
            if (Math.hypot(px - retPx.x, py - (retPx.y + retPx.h)) < tamanhoAlca) return 'cantoBL';
            if (Math.hypot(px - (retPx.x + retPx.w), py - (retPx.y + retPx.h)) < tamanhoAlca) return 'cantoBR';
            
            const centroX = retPx.x + retPx.w/2;
            const centroY = retPx.y + retPx.h/2;
            if (Math.hypot(px - centroX, py - centroY) < 40) return 'mover';
            
            return null;
        }
        
        function handleTouchStart(e) {
            if (!cameraAtiva) return;
            e.preventDefault();
            
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const touch = e.touches[0];
            let canvasX = (touch.clientX - rect.left) * scaleX;
            let canvasY = (touch.clientY - rect.top) * scaleY;
            canvasX = Math.min(Math.max(0, canvasX), canvasW);
            canvasY = Math.min(Math.max(0, canvasY), canvasH);
            
            const item = verificarToque(canvasX, canvasY);
            if (item) {
                arrastando = true;
                itemArrastando = item;
                ultimoToque = { x: canvasX, y: canvasY };
            }
        }
        
        function handleTouchMove(e) {
            if (!arrastando || !ultimoToque) return;
            e.preventDefault();
            
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const touch = e.touches[0];
            let canvasX = (touch.clientX - rect.left) * scaleX;
            let canvasY = (touch.clientY - rect.top) * scaleY;
            canvasX = Math.min(Math.max(0, canvasX), canvasW);
            canvasY = Math.min(Math.max(0, canvasY), canvasH);
            
            const deltaX = (canvasX - ultimoToque.x) / videoRect.w;
            const deltaY = (canvasY - ultimoToque.y) / videoRect.h;
            
            // Movimentar retângulo de medição
            if (itemArrastando === 'cantoTL') {
                retangulo.width -= deltaX;
                retangulo.height -= deltaY;
                retangulo.x += deltaX;
                retangulo.y += deltaY;
            } else if (itemArrastando === 'cantoTR') {
                retangulo.width += deltaX;
                retangulo.height -= deltaY;
                retangulo.y += deltaY;
            } else if (itemArrastando === 'cantoBL') {
                retangulo.width -= deltaX;
                retangulo.height += deltaY;
                retangulo.x += deltaX;
            } else if (itemArrastando === 'cantoBR') {
                retangulo.width += deltaX;
                retangulo.height += deltaY;
            } else if (itemArrastando === 'mover') {
                retangulo.x += deltaX;
                retangulo.y += deltaY;
            }
            // Movimentar retângulo de referência
            else if (itemArrastando === 'refTL') {
                referenciaRet.width -= deltaX;
                referenciaRet.height -= deltaY;
                referenciaRet.x += deltaX;
                referenciaRet.y += deltaY;
                aplicarRestricaoReferencia();
            } else if (itemArrastando === 'refTR') {
                referenciaRet.width += deltaX;
                referenciaRet.height -= deltaY;
                referenciaRet.y += deltaY;
                aplicarRestricaoReferencia();
            } else if (itemArrastando === 'refBL') {
                referenciaRet.width -= deltaX;
                referenciaRet.height += deltaY;
                referenciaRet.x += deltaX;
                aplicarRestricaoReferencia();
            } else if (itemArrastando === 'refBR') {
                referenciaRet.width += deltaX;
                referenciaRet.height += deltaY;
                aplicarRestricaoReferencia();
            } else if (itemArrastando === 'refMover') {
                referenciaRet.x += deltaX;
                referenciaRet.y += deltaY;
                aplicarRestricaoReferencia();
            }
            
            // Restringir retângulo de medição
            retangulo.x = Math.min(0.98, Math.max(0, retangulo.x));
            retangulo.y = Math.min(0.98, Math.max(0, retangulo.y));
            retangulo.width = Math.min(1 - retangulo.x, Math.max(0.02, retangulo.width));
            retangulo.height = Math.min(1 - retangulo.y, Math.max(0.02, retangulo.height));
            
            ultimoToque = { x: canvasX, y: canvasY };
            desenhar();
        }
        
        function handleTouchEnd() {
            arrastando = false;
            itemArrastando = null;
            desenhar();
        }
        
        function mudarModo(modo) {
            modoAtual = modo;
            if (modo === 'referencia') {
                modoRefBtn.classList.add('ativo');
                modoRetBtn.classList.remove('ativo');
                refConfig.style.display = 'block';
                retConfig.style.display = 'none';
            } else {
                modoRefBtn.classList.remove('ativo');
                modoRetBtn.classList.add('ativo');
                refConfig.style.display = 'none';
                retConfig.style.display = 'block';
            }
            desenhar();
        }
        
        function aplicarReferencia() {
            referenciaTamanhoReal = parseFloat(refTamanho.value);
            if (isNaN(referenciaTamanhoReal) || referenciaTamanhoReal <= 0) {
                referenciaTamanhoReal = 1.0;
                refTamanho.value = '1.00';
            }
            atualizarEscala();
            desenhar();
        }
        
        async function capturarTela() {
            const dim = getMetros();
            if (!dim.altura || !dim.largura) {
                alert("⚠️ Ajuste a referência e o retângulo primeiro!");
                return;
            }
            
            // Criar um canvas temporário para o print
            const printCanvas = document.createElement('canvas');
            const printCtx = printCanvas.getContext('2d');
            
            // Capturar o frame do vídeo
            const videoFrame = document.createElement('canvas');
            const videoCtx = videoFrame.getContext('2d');
            videoFrame.width = video.videoWidth;
            videoFrame.height = video.videoHeight;
            videoCtx.drawImage(video, 0, 0, video.videoWidth, video.videoHeight);
            
            // Configurar o canvas de impressão
            printCanvas.width = canvasW;
            printCanvas.height = canvasH;
            
            // Desenhar o frame do vídeo
            printCtx.drawImage(videoFrame, 0, 0, video.videoWidth, video.videoHeight, videoRect.x, videoRect.y, videoRect.w, videoRect.h);
            
            // Desenhar apenas o retângulo de MEDIÇÃO (verde) - SEM o retângulo de referência
            const retPx = {
                x: videoRect.x + retangulo.x * videoRect.w,
                y: videoRect.y + retangulo.y * videoRect.h,
                w: retangulo.width * videoRect.w,
                h: retangulo.height * videoRect.h
            };
            printCtx.strokeStyle = '#00ffcc';
            printCtx.lineWidth = 4;
            printCtx.strokeRect(retPx.x, retPx.y, retPx.w, retPx.h);
            
            // Mostrar medidas dentro do retângulo na captura
            printCtx.font = "bold 16px sans-serif";
            printCtx.fillStyle = '#ffffff';
            printCtx.shadowBlur = 3;
            printCtx.shadowColor = 'black';
            printCtx.fillText(`${dim.largura.toFixed(2)}m`, retPx.x + retPx.w/2 - 30, retPx.y + retPx.h/2 - 10);
            printCtx.fillText(`${dim.altura.toFixed(2)}m`, retPx.x + retPx.w/2 - 25, retPx.y + retPx.h/2 + 20);
            
            // Adicionar informações no rodapé com fundo
            const dataHora = new Date().toLocaleString();
            const textoInfo = `📐 ${dim.altura.toFixed(3)}m  |  📏 ${dim.largura.toFixed(3)}m  |  📊 ${dim.area.toFixed(3)}m²  |  ${dataHora}`;
            
            // Fundo do rodapé
            printCtx.fillStyle = 'rgba(0,0,0,0.7)';
            printCtx.fillRect(0, printCanvas.height - 40, printCanvas.width, 45);
            
            // Texto do rodapé
            printCtx.font = "13px sans-serif";
            printCtx.fillStyle = '#ffffff';
            printCtx.shadowBlur = 0;
            printCtx.fillText(textoInfo, 15, printCanvas.height - 15);
            
            // Salvar a imagem
            try {
                printCanvas.toBlob(async (blob) => {
                    const file = new File([blob], `medicao_${Date.now()}.png`, { type: 'image/png' });
                    
                    if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
                        try {
                            await navigator.share({
                                title: 'Medição Outdoor',
                                text: `Altura: ${dim.altura.toFixed(3)}m | Largura: ${dim.largura.toFixed(3)}m | Área: ${dim.area.toFixed(3)}m²`,
                                files: [file]
                            });
                        } catch(e) {
                            downloadImage(printCanvas);
                        }
                    } else {
                        downloadImage(printCanvas);
                    }
                }, 'image/png');
            } catch(e) {
                alert("✅ Medição salva! Área: " + dim.area.toFixed(3) + " m²");
            }
        }
        
        function downloadImage(canvas) {
            const link = document.createElement('a');
            link.download = `medicao_${Date.now()}.png`;
            link.href = canvas.toDataURL();
            link.click();
            alert("📸 Imagem salva!");
        }
        
        function resetCompleto() {
            retangulo = { x: 0.3, y: 0.3, width: 0.4, height: 0.4 };
            referenciaRet = {
                x: 0.4, y: 0.5,
                width: 0.2, height: 0.2
            };
            aplicarRestricaoReferencia();
            pixelsPorMetro = null;
            desenhar();
        }
        
        function togglePainel() {
            painelVisivel = !painelVisivel;
            if (painelVisivel) {
                painel.classList.remove('oculto');
                eyeBtn.innerHTML = '👁️';
            } else {
                painel.classList.add('oculto');
                eyeBtn.innerHTML = '🚫';
            }
            desenhar();
        }
        
        async function iniciarCamera() {
            try {
                if (window.stream) window.stream.getTracks().forEach(track => track.stop());
                const constraints = { video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } } };
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                window.stream = stream;
                video.srcObject = stream;
                await new Promise((resolve) => { video.onloadedmetadata = () => { video.play(); resolve(); }; });
                cameraAtiva = true;
                redimensionar();
                iniciarLoop();
            } catch(err) {
                alert("Erro ao acessar câmera. Verifique as permissões.");
            }
        }
        
        function redimensionar() {
            canvasW = window.innerWidth;
            canvasH = window.innerHeight;
            canvas.width = canvasW;
            canvas.height = canvasH;
            calcularVideoRect();
            desenhar();
        }
        
        function iniciarLoop() {
            function loop() {
                if (cameraAtiva && video.readyState >= 2) {
                    if (canvas.width !== window.innerWidth || canvas.height !== window.innerHeight) redimensionar();
                    desenhar();
                }
                requestAnimationFrame(loop);
            }
            loop();
        }
        
        canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
        canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
        canvas.addEventListener('touchend', handleTouchEnd);
        
        eyeBtn.addEventListener('click', togglePainel);
        captureBtn.addEventListener('click', capturarTela);
        modoRefBtn.addEventListener('click', () => mudarModo('referencia'));
        modoRetBtn.addEventListener('click', () => mudarModo('retangulo'));
        orientVerticalBtn.addEventListener('click', () => mudarOrientacao('vertical'));
        orientHorizontalBtn.addEventListener('click', () => mudarOrientacao('horizontal'));
        aplicarRef.addEventListener('click', aplicarReferencia);
        resetBtn.addEventListener('click', resetCompleto);
        window.addEventListener('resize', redimensionar);
        
        iniciarCamera();
    </script>
</body>
</html>
